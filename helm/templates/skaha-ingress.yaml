{{- if .Values.ingress.enabled }}
{{- $mb := .Values.metricsBackend | default dict }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-skaha-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    spec.ingressClassName: traefik
spec:
  rules:
  - host: {{ .Values.deployment.hostname }}
    http:
      paths:
      - path: {{ .Values.ingress.path | default "/skaha"}}
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-skaha-tomcat-svc
            port:
              number: {{ .Values.service.port | default "8080" }}
      {{- $ming := $mb.ingress | default dict }}
      {{- if and (default false $mb.enabled) $ming.enabled }}
      - path: {{ $ming.path | default "/metrics" }}
        pathType: Prefix
        backend:
          service:
            name: {{ include "skaha.metricsBackend.serviceName" . }}
            port:
              name: http
      {{- end }}
{{- end }}
