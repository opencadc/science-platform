---
apiVersion: batch/v1
kind: Job
metadata:
  name: "${skaha.jobname}"
spec:
  parallelism: 1
  completions: 1
  activeDeadlineSeconds: ${skaha.sessionexpiry}
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      restartPolicy: OnFailure
      {{ template "skaha.job.nodeAffinity" . }}
      securityContext:
        {{ template "skaha.job.securityContext" . }}
      priorityClassName: uber-user-preempt-medium
      hostname: "${software.hostname}"
      initContainers:
      {{ template "skaha.job.initContainers" . }}
      containers:
      - name: "${skaha.jobname}"
        env:
        - name: skaha_hostname
          value: "${skaha.hostname}"
        - name: skaha_username
          value: "${skaha.userid}"
        - name: skaha_sessionid
          value: "${skaha.sessionid}"
        - name: HOME
          value: "${SKAHA_USER_HOME_DIR}"
        - name: PWD
          value: "${SKAHA_USER_HOME_DIR}"
        - name: OMP_NUM_THREADS
          value: "${software.thread.count}"
        - name: SKAHA_TOP_LEVEL_DIR
          value: "${SKAHA_TOP_LEVEL_DIR}"
        - name: SKAHA_PROJECTS_DIR
          value: "${SKAHA_PROJECTS_DIR}"
        - name: SKAHA_SESSION_URL_PATH
          value: "${skaha.sessionurlpath}"
        - name: CARTA_PORT
          value: "6901"
        - name: CARTA_IDLE_TIMEOUT
          value: "100000"

        # Increase the maximum headers size to 32KB to support the large number of headers required by the Carta session.
        # This is an issue because local cookies will be sent to the server in the headers, and the default size is too small.
        # 2026.06.26 jenkinsd
        #
        - name: UWS_HTTP_MAX_HEADERS_SIZE
          value: "32768"
        securityContext:
          privileged: false
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        image: ${software.imageid}
        imagePullPolicy: {{ .Values.deployment.skaha.sessions.imagePullPolicy | required "deployment.skaha.sessions.imagePullPolicy must be set." }}
        resources:
          requests:
            memory: "${software.requests.ram}"
            cpu: "${software.requests.cores}"
            ephemeral-storage: "{{ .Values.deployment.skaha.sessions.minEphemeralStorage }}"
          limits:
            memory: "${software.limits.ram}"
            cpu: "${software.limits.cores}"
            ephemeral-storage: "{{ .Values.deployment.skaha.sessions.maxEphemeralStorage }}"
        livenessProbe:
          httpGet:
            path: "${skaha.sessionurlpath}/"
            port: 6901
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: "${skaha.sessionurlpath}/"
            port: 6901
          periodSeconds: 15
        startupProbe:
          httpGet:
            path: "${skaha.sessionurlpath}/"
            port: 6901
          initialDelaySeconds: 10
          timeoutSeconds: 300
          periodSeconds: 10
          failureThreshold: 30
        ports:
        - containerPort: 5901
          protocol: TCP
          name: websocket-port
        - containerPort: 6901
          protocol: TCP
          name: frontend-port
        volumeMounts:
        - mountPath: "/etc/passwd"
          name: etc-passwd
          subPath: passwd
        - mountPath: "/etc/group"
          name: etc-group
          subPath: group
        {{ template "skaha.session.commonVolumeMounts" . }}
      {{- with .Values.deployment.skaha.sessions.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      - name: etc-group
        emptyDir: { }
      - name: etc-passwd
        emptyDir: { }
      - name: init-users-groups
        configMap:
          name: {{ .Release.Name }}-init-users-groups-config
          defaultMode: 0777
      {{ template "skaha.session.commonVolumes" . }}
