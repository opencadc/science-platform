# Default chart values (override with values-dev.yaml for local/dev flows)
replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: images.opencadc.org/platform/metrics
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

resources: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Flat env map -> container env (METRICS_* keys)
env: {}

redis:
  enabled: true
  image: redis:7-alpine
  resources: {}
