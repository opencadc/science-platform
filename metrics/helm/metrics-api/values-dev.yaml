# Development values (kept in-repo per M1; int/staging/prod live elsewhere)
image:
  repository: images.opencadc.org/platform/metrics
  tag: latest
  pullPolicy: IfNotPresent

env:
  METRICS_ENVIRONMENT: "dev"
  METRICS_CLUSTER_NAME: "dev-cluster"
  METRICS_SOURCES__PLATFORM: "kueue"
  METRICS_CACHE__BACKEND: "redis"
  METRICS_CACHE__TTL_SECONDS: "15"
  METRICS_OTEL_METRICS_ENABLED: "false"
  METRICS_PROVIDERS__KUEUE__KUBE_API_URL: "https://kubernetes.default.svc"
  METRICS_PROVIDERS__KUEUE__CLUSTER_QUEUES: '["cq-example"]'
  METRICS_PROVIDERS__KUEUE__COHORT: "cohort-example"
  METRICS_PROVIDERS__PROMETHEUS__URL: "http://prometheus.monitoring.svc:9090"

redis:
  enabled: true
