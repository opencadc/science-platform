apiVersion: v1
kind: Service
metadata:
  name: {{ include "metrics-api.fullname" . }}-metrics-api
  labels:
    {{- include "metrics-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "metrics-api.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
