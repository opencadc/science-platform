version: 1

# Repository-specific validation gates and configuration. The portable harness
# runtime in `.harness/harness/` reads this file; it does not ship product
# facts of its own. Update values here when product stack, coverage target, or
# gate commands change, not in the harness runtime code.

min_coverage: 80

gates:
  - id: harness-contracts
    command: uv run --group harness pytest -q tests/harness/test_contracts.py
    evidence:
      - pytest output
      - harness contract result summary
    required: true
    failure_handling: Fix harness schema or adapter drift before handoff.
  - id: repository-coverage
    command: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=80
    evidence:
      - pytest output
      - coverage summary with threshold status
    required: true
    failure_handling: Fix coverage regression before handoff; only document a blocker when the product test harness itself cannot execute.
  - id: harness-cli
    command: uv run --group harness python -m harness check
    evidence:
      - PASS/FAIL status table
    required: true
    failure_handling: Fix failed check before harness handoff.
