apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: cq-proton
spec:
  cohortName: cohort-atom
  queueingStrategy: BestEffortFIFO
  flavorFungibility:
    whenCanBorrow: MayStopSearch
    whenCanPreempt: TryNextFlavor
  preemption:
    reclaimWithinCohort: Never
    withinClusterQueue: Never
    borrowWithinCohort:
      policy: Never
  namespaceSelector: {}
  resourceGroups:
    - coveredResources:
        - cpu
        - memory
      flavors:
        - name: default-flavor
          resources:
            - name: cpu
              nominalQuota: "10"
            - name: memory
              nominalQuota: "20Gi"
