apiVersion: kueue.x-k8s.io/v1beta2
kind: Cohort
metadata:
  name: cohort-atom
spec:
  resourceGroups:
    - coveredResources:
        - cpu
        - memory
      flavors:
        - name: default-flavor
          resources:
            - name: cpu
              nominalQuota: "3"
            - name: memory
              nominalQuota: "8Gi"
