# Release Please Actions (Skaha + Metrics packages; Skaha CD dispatches are gated)
name: "CD: Skaha Release Please"

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: github.repository == 'opencadc/science-platform'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Path filter for non-Metrics changes
        uses: dorny/paths-filter@v4.0.1
        id: path-filter
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}
          filters: |
            non_metrics:
              - '**'
              - '!metrics/**'
      - name: Create release
        id: release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
      - name: Dispatch Edge Build
        # Skaha edge image: skip when this push only changes Metrics paths
        if: >-
          steps['release-please'].outcome == 'success'
          && github.event_name == 'push'
          && steps['path-filter'].outputs.non_metrics == 'true'
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          repository: opencadc/science-platform
          event-type: edge-build
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Skaha Release Info
        if: >-
          steps['release-please'].outputs.release_created == 'true'
          && !startsWith(steps['release-please'].outputs.tag_name, 'metric-v')
        run: |
          echo "Releases Created: ${{ steps.release-please.outputs.release_created }}"
          echo "tag: ${{ steps.release-please.outputs.tag_name }}"
          echo "sha: ${{ steps.release-please.outputs.sha }}"
          echo "major: ${{ steps.release-please.outputs.major }}"
          echo "minor: ${{ steps.release-please.outputs.minor }}"
          echo "patch: ${{ steps.release-please.outputs.patch }}"
      - name: Dispatch Skaha Release Build
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        if: >-
          steps['release-please'].outputs.release_created == 'true'
          && !startsWith(steps['release-please'].outputs.tag_name, 'metric-v')
        with:
          repository: opencadc/science-platform
          event-type: release-build
          token: ${{ secrets.GITHUB_TOKEN }}
          client-payload: |-
            {
              "releases_created": "${{ steps['release-please'].outputs.release_created }}",
              "tag_name": "${{ steps['release-please'].outputs.tag_name }}",
              "sha": "${{ steps['release-please'].outputs.sha }}"
            }
