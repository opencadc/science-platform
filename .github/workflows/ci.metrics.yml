name: "CI: Metrics API"

on:
  pull_request:
    branches: [main]
    paths:
      - "metrics/**"
      - ".github/workflows/ci.metrics.yml"
  push:
    branches: [main]
    paths:
      - "metrics/**"
      - ".github/workflows/ci.metrics.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metrics-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: metrics
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Validate Docker Compose specification
        run: docker compose -f compose.yaml config >/dev/null
      - name: Lint
        run: uv run ruff check src tests
      - name: Unit tests
        run: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=80 -m "not integration"
      - name: Harness contract tests
        run: uv run --group harness pytest -q tests/harness/test_contracts.py
      - name: Harness CLI check
        run: uv run --group harness python -m harness check

  metrics-minikube-smoke:
    runs-on: ubuntu-latest
    needs: metrics-lint-test
    defaults:
      run:
        working-directory: metrics
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Setup Minikube
        uses: manusa/actions-setup-minikube@v2.13.0
        with:
          minikube version: v1.35.0
          kubernetes version: v1.30.0
          github token: ${{ secrets.GITHUB_TOKEN }}
          driver: docker
      - name: Enable metrics-server addon
        run: minikube addons enable metrics-server
      - name: Install Kueue and apply M2 fixtures
        working-directory: metrics
        run: |
          bash scripts/install-kueue-minikube.sh
          kubectl apply -f tests/fixtures/kueue/
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Build and load image
        run: |
          docker build -t canfar-metrics-local:latest .
          minikube image load canfar-metrics-local:latest
      - name: Pre-load Redis image into Minikube
        run: |
          # Avoid slow or flaky pulls from Docker Hub inside the cluster during rollout.
          docker pull redis:7-alpine
          minikube image load redis:7-alpine
      - name: Helm deploy
        run: |
          helm upgrade --install metrics-api ./helm/metrics-api \
            --namespace metrics \
            --create-namespace \
            -f scripts/minikube-values.yaml \
            --set "image.repository=canfar-metrics-local" \
            --set "image.tag=latest"
      - name: Wait for Redis
        run: kubectl -n metrics rollout status deploy/metrics-api-redis --timeout=300s
      - name: Wait for Metrics API
        run: kubectl -n metrics rollout status deploy/metrics-api-metrics-api --timeout=300s
      - name: Integration smoke tests
        run: |
          kubectl -n metrics port-forward svc/metrics-api-metrics-api 18080:8000 >/tmp/metrics-pf.log 2>&1 &
          echo $! > /tmp/metrics-pf.pid
          sleep 3
          METRICS_BASE_URL="http://127.0.0.1:18080" uv run pytest tests/integration -m integration -q
          kill "$(cat /tmp/metrics-pf.pid)" || true
