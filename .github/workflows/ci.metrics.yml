name: "CI: Metrics API"

on:
  pull_request:
    branches: [main]
    paths:
      - "metrics/**"
      - ".github/workflows/ci.metrics.yml"
  push:
    branches: [main]
    paths:
      - "metrics/**"
      - ".github/workflows/ci.metrics.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  metrics-lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: metrics
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          working-directory: metrics
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Validate Docker Compose specification
        run: docker compose -f compose.yaml config >/dev/null
      - name: Lint
        run: uv run ruff check src tests
      - name: Unit tests
        run: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=80 -m "not integration"
      - name: Harness contract tests
        run: uv run --group harness pytest -q tests/harness/test_contracts.py
      - name: Harness CLI check
        run: uv run --group harness python -m harness check

  metrics-minikube-smoke:
    runs-on: ubuntu-latest
    needs: metrics-lint-test
    timeout-minutes: 60
    env:
      # Stable paths: cache Minikube/Helm; Skaffold binary cached under .ci-cache/skaffold (see workflow steps).
      MINIKUBE_HOME: ${{ github.workspace }}/.ci-minikube
      HELM_CACHE_HOME: ${{ github.workspace }}/.ci-helm-cache
      KUEUE_CHART_VERSION: "0.17.0"
      SKAFFOLD_VERSION: "2.18.3"
      # Quieter Skaffold in CI; must match the image used when metrics-server addon is enabled.
      SKAFFOLD_UPDATE_CHECK: "false"
      METRICS_SERVER_IMAGE: registry.k8s.io/metrics-server/metrics-server:v0.7.2
    defaults:
      run:
        working-directory: metrics
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Cache Minikube and Helm data
        uses: actions/cache@v4
        with:
          path: |
            .ci-minikube/cache
            .ci-helm-cache
          key: metrics-minikube-ci-${{ runner.os }}-mk-v1.35.0-k8s-v1.30.0-kueue-${{ env.KUEUE_CHART_VERSION }}-skaffold-${{ env.SKAFFOLD_VERSION }}-${{ hashFiles('.github/workflows/ci.metrics.yml', 'metrics/scripts/minikube-smoke.sh', 'metrics/scripts/lib-minikube-smoke.sh', 'metrics/scripts/test-setup.yaml', 'metrics/helm/metrics-api/Chart.yaml', 'metrics/helm/metrics-api/values.yaml', 'metrics/helm/metrics-api/templates/**', 'metrics/scripts/minikube-values.yaml', 'metrics/skaffold.yaml') }}
      - name: Ensure Minikube and Helm cache directories exist
        working-directory: ${{ github.workspace }}
        run: mkdir -p "${MINIKUBE_HOME}/cache" "${HELM_CACHE_HOME}"
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          working-directory: metrics
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Cache Skaffold CLI
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ci-cache/skaffold/skaffold-linux-amd64
          key: metrics-ci-skaffold-${{ runner.os }}-v${{ env.SKAFFOLD_VERSION }}
      - name: Install Skaffold
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          _bin="${GITHUB_WORKSPACE}/.ci-cache/skaffold/skaffold-linux-amd64"
          mkdir -p "$(dirname "${_bin}")"
          if [[ ! -f "${_bin}" ]]; then
            curl -fsSL "https://github.com/GoogleContainerTools/skaffold/releases/download/v${SKAFFOLD_VERSION}/skaffold-linux-amd64" -o "${_bin}"
            chmod +x "${_bin}"
          fi
          sudo install -m 0755 "${_bin}" /usr/local/bin/skaffold
          skaffold version | grep -q "v${SKAFFOLD_VERSION}"
      - name: Setup Minikube
        uses: manusa/actions-setup-minikube@v2.13.0
        with:
          minikube version: v1.35.0
          kubernetes version: v1.30.0
          github token: ${{ secrets.GITHUB_TOKEN }}
          driver: docker
      - name: Pre-load metrics-server image into Minikube
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          timeout 15m docker pull "${METRICS_SERVER_IMAGE}"
          timeout 15m minikube image load "${METRICS_SERVER_IMAGE}" --overwrite
      - name: Enable metrics-server addon
        run: minikube addons enable metrics-server
      - name: Pre-load Alpine image for Kueue smoke workload
        run: |
          set -euo pipefail
          timeout 10m docker pull alpine:3.20
          timeout 10m minikube image load alpine:3.20 --overwrite
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Pre-load Redis image into Minikube
        run: |
          set -euo pipefail
          timeout 10m docker pull redis:7-alpine
          timeout 10m minikube image load redis:7-alpine --overwrite
      - name: Minikube smoke (Kueue, test-setup, Skaffold, integration tests)
        working-directory: metrics
        env:
          KUBE_CONTEXT: minikube
          MINIKUBE_PROFILE: minikube
          MINIKUBE_SMOKE_CI: "1"
          MINIKUBE_IMAGE_LOAD_TIMEOUT_SECONDS: "900"
        run: |
          set -euo pipefail
          # Hard cap so a stuck image transfer or kubectl wait cannot burn the full job budget silently.
          timeout 55m bash scripts/minikube-smoke.sh
      - name: Teardown Minikube smoke (Helm/Kueue fixtures + cluster)
        if: always()
        working-directory: metrics
        env:
          KUBE_CONTEXT: minikube
          MINIKUBE_PROFILE: minikube
          NAMESPACE: metrics
        run: |
          set +e
          bash scripts/minikube-smoke-teardown.sh --all --minikube
          if command -v minikube >/dev/null 2>&1; then
            minikube delete -p "${MINIKUBE_PROFILE}" 2>/dev/null || true
          fi
          exit 0
