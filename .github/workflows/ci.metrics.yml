name: "CI: Metrics API"

on:
  pull_request:
    branches: [main]
    paths:
      - "metrics/**"
      - ".github/workflows/ci.metrics.yml"
  push:
    branches: [main]
    paths:
      - "metrics/**"
      - ".github/workflows/ci.metrics.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  metrics-lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: metrics
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          working-directory: metrics
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Lint
        run: uv run ruff check src tests
      - name: Unit tests
        run: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=80 -m "not integration"
      - name: Harness contract tests
        run: uv run --group harness pytest -q tests/harness/test_contracts.py
      - name: Harness CLI check
        run: uv run --group harness python -m harness check

  metrics-kind-smoke:
    runs-on: ubuntu-latest
    needs: metrics-lint-test
    timeout-minutes: 60
    env:
      KUEUE_CHART_VERSION: "0.17.0"
      HELM_CACHE_HOME: ${{ github.workspace }}/.ci-helm-cache
      METRICS_IMAGE_REPOSITORY: canfar-metrics-local
      METRICS_IMAGE_TAG: ${{ github.sha }}
    defaults:
      run:
        working-directory: metrics
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Cache Helm data
        uses: actions/cache@v5
        with:
          path: .ci-helm-cache
          key: metrics-kind-helm-${{ runner.os }}-kueue-${{ env.KUEUE_CHART_VERSION }}-${{ hashFiles('.github/workflows/ci.metrics.yml') }}
      - name: Ensure Helm cache directory exists
        working-directory: ${{ github.workspace }}
        run: mkdir -p "${HELM_CACHE_HOME}"
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          working-directory: metrics
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4
      - name: Setup kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.30.0
      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.2
      - name: Setup kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          version: v0.30.0
          kubectl_version: v1.30.0
          cluster_name: metrics
          wait: 120s
      - name: Build Metrics image (cache-enabled)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: ./metrics
          file: ./metrics/Dockerfile
          load: true
          tags: ${{ env.METRICS_IMAGE_REPOSITORY }}:${{ env.METRICS_IMAGE_TAG }}
          cache-from: type=gha,scope=metrics-kind-image
          cache-to: type=gha,mode=max,scope=metrics-kind-image
      - name: Kind smoke (Kueue, test-setup, Helm, integration tests)
        env:
          KIND_CLUSTER_NAME: metrics
          KUBE_CONTEXT: kind-metrics
          KIND_SMOKE_CI: "1"
          KIND_SMOKE_EXIT_AFTER_TESTS: "1"
          KIND_SMOKE_SKIP_BUILD: "1"
          KIND_IMAGE_LOAD_TIMEOUT_SECONDS: "900"
          KIND_PRELOAD_IMAGES: "false"
          METRICS_IMAGE_REPOSITORY: ${{ env.METRICS_IMAGE_REPOSITORY }}
          METRICS_IMAGE_TAG: ${{ env.METRICS_IMAGE_TAG }}
        run: |
          set -euo pipefail
          timeout 55m bash scripts/kind-smoke.sh
      - name: Teardown kind smoke (Helm/Kueue fixtures + cluster)
        if: always()
        env:
          KIND_CLUSTER_NAME: metrics
          KUBE_CONTEXT: kind-metrics
          NAMESPACE: metrics
        run: |
          set +e
          bash scripts/kind-smoke-teardown.sh --all --kind
          if command -v kind >/dev/null 2>&1; then
            kind delete cluster --name "${KIND_CLUSTER_NAME}" 2>/dev/null || true
          fi
          exit 0
