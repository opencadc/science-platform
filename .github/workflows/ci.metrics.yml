name: "CI: Metrics API"

on:
  pull_request:
    branches: [main]
    paths:
      - "metrics/**"
      - ".github/workflows/ci.metrics.yml"
  push:
    branches: [main]
    paths:
      - "metrics/**"
      - ".github/workflows/ci.metrics.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metrics-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: metrics
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Validate Docker Compose specification
        run: docker compose -f compose.yaml config >/dev/null
      - name: Lint
        run: uv run ruff check src tests
      - name: Unit tests
        run: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=80 -m "not integration"
      - name: Harness contract tests
        run: uv run --group harness pytest -q tests/harness/test_contracts.py
      - name: Harness CLI check
        run: uv run --group harness python -m harness check

  metrics-minikube-smoke:
    runs-on: ubuntu-latest
    needs: metrics-lint-test
    env:
      # Stable paths: cache Minikube/Helm; Skaffold is a single pinned binary (no separate cache dir).
      MINIKUBE_HOME: ${{ github.workspace }}/.ci-minikube
      HELM_CACHE_HOME: ${{ github.workspace }}/.ci-helm-cache
      KUEUE_CHART_VERSION: "0.17.0"
      SKAFFOLD_VERSION: "2.18.3"
      # Quieter Skaffold in CI; must match the image used when metrics-server addon is enabled.
      SKAFFOLD_UPDATE_CHECK: "false"
      METRICS_SERVER_IMAGE: registry.k8s.io/metrics-server/metrics-server:v0.7.2
    defaults:
      run:
        working-directory: metrics
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Cache Minikube and Helm data
        uses: actions/cache@v4
        with:
          path: |
            .ci-minikube/cache
            .ci-helm-cache
          key: metrics-minikube-ci-${{ runner.os }}-mk-v1.35.0-k8s-v1.30.0-kueue-${{ env.KUEUE_CHART_VERSION }}-skaffold-${{ env.SKAFFOLD_VERSION }}-${{ hashFiles('.github/workflows/ci.metrics.yml', 'metrics/scripts/minikube-smoke.sh', 'metrics/scripts/lib-minikube-smoke.sh', 'metrics/scripts/test-setup.yaml', 'metrics/helm/metrics-api/Chart.yaml', 'metrics/helm/metrics-api/values.yaml', 'metrics/helm/metrics-api/templates/**', 'metrics/scripts/minikube-values.yaml', 'metrics/skaffold.yaml') }}
      - name: Ensure Minikube and Helm cache directories exist
        working-directory: ${{ github.workspace }}
        run: mkdir -p "${MINIKUBE_HOME}/cache" "${HELM_CACHE_HOME}"
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Install Skaffold
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/GoogleContainerTools/skaffold/releases/download/v${{ env.SKAFFOLD_VERSION }}/skaffold-linux-amd64" -o /tmp/skaffold
          sudo install -m 0755 /tmp/skaffold /usr/local/bin/skaffold
          skaffold version | grep -q "v${{ env.SKAFFOLD_VERSION }}"
      - name: Setup Minikube
        uses: manusa/actions-setup-minikube@v2.13.0
        with:
          minikube version: v1.35.0
          kubernetes version: v1.30.0
          github token: ${{ secrets.GITHUB_TOKEN }}
          driver: docker
      - name: Pre-load metrics-server image into Minikube
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          docker pull "${METRICS_SERVER_IMAGE}"
          minikube image load "${METRICS_SERVER_IMAGE}"
      - name: Enable metrics-server addon
        run: minikube addons enable metrics-server
      - name: Pre-load Alpine image for Kueue smoke workload
        run: |
          docker pull alpine:3.20
          minikube image load alpine:3.20
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Pre-load Redis image into Minikube
        run: |
          docker pull redis:7-alpine
          minikube image load redis:7-alpine
      - name: Minikube smoke (Kueue, test-setup, Skaffold, integration tests)
        working-directory: metrics
        env:
          KUBE_CONTEXT: minikube
          MINIKUBE_PROFILE: minikube
          MINIKUBE_SMOKE_CI: "1"
        run: |
          set -euo pipefail
          bash scripts/minikube-smoke.sh
