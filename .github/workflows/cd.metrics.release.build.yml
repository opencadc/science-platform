name: "CD: Metrics Release Image"

# release-please uses metric-v* (see release-please-config.json). Tag push works when
# the tag is created with a non-GITHUB_TOKEN credential; repository_dispatch from
# CD: Science Platform Release Please covers the default GITHUB_TOKEN case.
on:
  push:
    tags:
      - "metric-v*"
  repository_dispatch:
    types: [metrics-release-build]

permissions:
  contents: read

env:
  REGISTRY: images.opencadc.org
  IMAGE: platform/metrics
  IMAGE_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag_name || github.ref_name }}

jobs:
  metrics-release-image:
    if: >-
      github.repository == 'opencadc/science-platform'
      && (github.event_name == 'repository_dispatch' || startsWith(github.ref_name, 'metric-v'))
    concurrency:
      group: metrics-release-image-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag_name || github.ref_name }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.sha || github.ref }}
      - name: Set image tag
        id: meta
        run: echo "tag=${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          install: true
      - name: Perform Container Registry Login
        uses: docker/login-action@v4.1.0
        with:
          registry: images.opencadc.org
          username: ${{ secrets.SKAHA_REGISTRY_USERNAME }}
          password: ${{ secrets.SKAHA_REGISTRY_TOKEN }}
      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: metrics
          file: metrics/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          labels: |
            org.opencontainers.image.title=metrics
            org.opencontainers.image.version=${{ steps.meta.outputs.tag }}
            org.opencontainers.image.description="CANFAR Metrics API"
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.url=https://github.com/opencadc/science-platform
      - name: Inspect multi-arch manifest
        run: |
          docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}"
      - name: Attest Container Image
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          show-summary: true
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v2.4.1
      - name: Cosign Container Image
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE }}@${{ steps.build.outputs.digest }}" --upload
