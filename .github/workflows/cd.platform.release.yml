# Release Please (Skaha + Metrics). Image workflows: Skaha is started via
# repository_dispatch (GITHUB_TOKEN cannot chain push.tag workflows) and/or tag
# push when a PAT is used; Metrics uses metrics-v* tag pushes the same way.
name: "CD: Science Platform Release Please"

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: github.repository == 'opencadc/science-platform'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Create release
        id: release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
      - name: Skaha Release Info
        if: >-
          steps['release-please'].outputs.release_created == 'true'
          && !startsWith(steps['release-please'].outputs.tag_name, 'metrics-v')
        run: |
          echo "Releases Created: ${{ steps.release-please.outputs.release_created }}"
          echo "tag: ${{ steps.release-please.outputs.tag_name }}"
          echo "sha: ${{ steps.release-please.outputs.sha }}"
          echo "major: ${{ steps.release-please.outputs.major }}"
          echo "minor: ${{ steps.release-please.outputs.minor }}"
          echo "patch: ${{ steps.release-please.outputs.patch }}"
      - name: Dispatch Skaha release build
        if: >-
          steps['release-please'].outputs.release_created == 'true'
          && !startsWith(steps['release-please'].outputs.tag_name, 'metrics-v')
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          repository: opencadc/science-platform
          event-type: release-build
          token: ${{ secrets.GITHUB_TOKEN }}
          client-payload: |-
            {
              "releases_created": "${{ steps['release-please'].outputs.release_created }}",
              "tag_name": "${{ steps['release-please'].outputs.tag_name }}",
              "sha": "${{ steps['release-please'].outputs.sha }}"
            }
      - name: Dispatch Metrics release build
        if: >-
          steps['release-please'].outputs['metrics--release_created'] == 'true'
          && startsWith(steps['release-please'].outputs['metrics--tag_name'], 'metrics-v')
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          repository: opencadc/science-platform
          event-type: metrics-release-build
          token: ${{ secrets.GITHUB_TOKEN }}
          client-payload: |-
            {
              "releases_created": "${{ steps['release-please'].outputs['metrics--release_created'] }}",
              "tag_name": "${{ steps['release-please'].outputs['metrics--tag_name'] }}",
              "sha": "${{ steps['release-please'].outputs['metrics--sha'] }}"
            }
