name: "CD: Skaha Release Build"

# - Tag push: builds when a non-Metrics tag is created (PAT or manual push; GITHUB_TOKEN
#   cannot trigger downstream push workflows, see GitHub docs "triggering a workflow").
# - repository_dispatch: used by CD: Science Platform Release Please so automated
#   release-please tags still start this workflow when using the default GITHUB_TOKEN.
# Metrics uses metrics-v* tags and is excluded; see cd.metrics.release.build.yml
#
# Helm (Harbor classic chartrepo, not OCI helm push): packaged chart is POSTed to
# {HARBOR_HELM_BASE_URL}/chartrepo/{HARBOR_HELM_REPO_PROJECT}/charts so it appears
# under the Harbor "Helm Charts" UI. Optionally set repo vars:
# - HARBOR_HELM_BASE_URL (default https://<REGISTRY> e.g. https://images.opencadc.org)
# - HARBOR_HELM_REPO_PROJECT (Harbor project name, default platform)
on:
  push:
    tags:
      - "*"
  repository_dispatch:
    types: [release-build]

permissions:
  contents: read

env:
  REGISTRY: images.opencadc.org
  IMAGE: platform/skaha
  TAG: latest
  TAG_RELEASE: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag_name || github.ref_name }}

jobs:
  release-build:
    if: >-
      github.repository == 'opencadc/science-platform'
      && (github.event_name == 'repository_dispatch' || !startsWith(github.ref_name, 'metrics-v'))
    concurrency:
      group: skaha-release-image-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag_name || github.ref_name }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - name: Release context
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "repository_dispatch — tag: ${{ github.event.client_payload.tag_name }} sha: ${{ github.event.client_payload.sha }}"
          else
            echo "tag push — ref: ${{ github.ref_name }} sha: ${{ github.sha }}"
          fi
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.sha || github.ref }}
      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.21.0
      - name: Package Helm chart
        id: helm_pack
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/helm"
          helm dependency build
          helm lint .
          PKG_DIR="${RUNNER_TEMP}/helm-chart-package"
          mkdir -p "${PKG_DIR}"
          helm package . --destination "${PKG_DIR}"
          PKG_FILE="$(find "${PKG_DIR}" -maxdepth 1 -type f -name 'skaha-*.tgz' -print -quit)"
          [ -n "${PKG_FILE}" ] || { echo "helm package produced no skaha-*.tgz under ${PKG_DIR}" >&2; exit 1; }
          echo "package_path=${PKG_FILE}" >> "${GITHUB_OUTPUT}"
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          install: true
      - name: Perform Container Registry Login
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: images.opencadc.org
          username: ${{ secrets.SKAHA_REGISTRY_USERNAME }}
          password: ${{ secrets.SKAHA_REGISTRY_TOKEN }}
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: production
          file: skaha/Dockerfile
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.TAG_RELEASE }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:v${{ env.TAG_RELEASE }}
          labels: |
            org.opencontainers.image.title=skaha
            org.opencontainers.image.version=${{ env.TAG_RELEASE }}
            org.opencontainers.image.description="Science Platform Backend"
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.url=https://github.com/opencadc/science-platform
      - name: Attest Container Image
        # See https://github.com/marketplace/actions/attest-build-provenance#container-image
        # for more information on the attest-build-provenance action
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          # Currently not pushing attestations to Harbor Registry
          # push-to-registry: true
          show-summary: true
      - name: Install Cosign
        id: install-cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.4.1'
      - name: Cosign Container Image
        id: cosign
        run: |
          cosign version
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE }}@${{ steps.build.outputs.digest }} --upload
      - name: Push Helm chart to Harbor chart repository (non-OCI; Helm Charts tab)
        env:
          HELM_REPO_BASE_URL: ${{ vars.HARBOR_HELM_BASE_URL }}
          HELM_REPO_PROJECT: ${{ vars.HARBOR_HELM_REPO_PROJECT }}
          SKAHA_REGISTRY_USERNAME: ${{ secrets.SKAHA_REGISTRY_USERNAME }}
          SKAHA_REGISTRY_TOKEN: ${{ secrets.SKAHA_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          BASE="${HELM_REPO_BASE_URL:-https://${{ env.REGISTRY }}}"
          PROJECT="${HELM_REPO_PROJECT:-platform}"
          curl --fail-with-body -sS \
            -u "${SKAHA_REGISTRY_USERNAME}:${SKAHA_REGISTRY_TOKEN}" \
            -X POST "${BASE}/chartrepo/${PROJECT}/charts" \
            -F "chart=@${{ steps.helm_pack.outputs.package_path }}"
